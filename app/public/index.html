<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Routes Platform</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: Arial, sans-serif; display: flex; margin: 0; padding: 0; height: 100vh;}
        #sidebar { width: 320px; padding: 20px; background: #f8f9fa; height: 100%; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 1000;}
        #map { flex-grow: 1; height: 100%; z-index: 1;}
        .route-card { border: 1px solid #dee2e6; padding: 15px; margin-bottom: 10px; background: white; cursor: pointer; border-radius: 8px; transition: 0.2s;}
        .route-card:hover { background: #e9ecef; border-color: #adb5bd;}
        button { background: #0d6efd; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 10px; font-weight: bold;}
        button:hover { background: #0b5ed7; }
        form { margin-top: 25px; border-top: 2px solid #dee2e6; padding-top: 15px;}
        input, textarea { width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 10px; border: 1px solid #ced4da; border-radius: 4px;}
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="margin-top:0;">Маршруты</h2>
        <div id="routesList">Загрузка данных...</div>

        <form id="addRouteForm">
            <h3>Создать маршрут</h3>
            <input type="text" id="title" placeholder="Название маршрута" required>
            <textarea id="description" placeholder="Краткое описание" rows="3"></textarea>
            <button type="submit">Добавить маршрут</button>
        </form>

        <form id="addReviewForm">
            <h3>Оценить маршрут</h3>
            <input type="number" id="routeId" placeholder="ID маршрута" required>
            <input type="number" id="rating" placeholder="Оценка (1-5)" min="1" max="5" required>
            <textarea id="comment" placeholder="Отзыв" rows="2"></textarea>
            <button type="submit">Отправить отзыв</button>
        </form>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([43.5855, 39.7231], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let currentLayer = null;

        async function loadRoutes() {
            try {
                const res = await fetch('/api/routes');
                const routes = await res.json();
                const list = document.getElementById('routesList');
                list.innerHTML = '';

                routes.forEach(route => {
                    const div = document.createElement('div');
                    div.className = 'route-card';
                    div.innerHTML = `<strong>${route.title}</strong> (ID: ${route.id})<br><small style="color:#6c757d;">${route.description}</small>`;
                    div.onclick = () => drawRouteOnMap(route);
                    list.appendChild(div);
                });
            } catch (e) {
                document.getElementById('routesList').innerHTML = 'Ошибка загрузки БД';
            }
        }

        function drawRouteOnMap(route) {
            if (currentLayer) map.removeLayer(currentLayer);
            
            if (route.poi && route.poi.length > 0) {
                const latlngs = route.poi.map(p => [p.lat, p.lng]);
                const polyline = L.polyline(latlngs, {color: '#dc3545', weight: 4}).addTo(map);
                
                route.poi.forEach(p => {
                    L.marker([p.lat, p.lng]).addTo(map).bindPopup(`<b>${p.name}</b><br>${p.description}`);
                });

                map.fitBounds(polyline.getBounds());
                currentLayer = polyline;
            } else {
                alert('У этого маршрута пока нет гео-точек.');
            }
        }

        document.getElementById('addRouteForm').onsubmit = async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            
            await fetch('/api/routes', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: 1, title, description })
            });
            e.target.reset();
            loadRoutes();
        };

        document.getElementById('addReviewForm').onsubmit = async (e) => {
            e.preventDefault();
            const route_id = document.getElementById('routeId').value;
            const rating = document.getElementById('rating').value;
            const comment = document.getElementById('comment').value;

            await fetch('/api/reviews', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: 1, route_id, rating, comment })
            });
            alert('Отзыв успешно добавлен!');
            e.target.reset();
        };

        loadRoutes();
    </script>
</body>
</html>
