<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Travel Platform</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: Arial, sans-serif; display: flex; margin: 0; padding: 0; height: 100vh;}
        #sidebar { width: 450px; background: white; height: 100%; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000; display: flex; flex-direction: column;}
        .tabs { display: flex; background: #343a40; color: white; cursor: pointer; }
        .tab { flex: 1; text-align: center; padding: 15px 0; font-size: 13px; font-weight: bold;}
        .tab:hover, .tab.active { background: #0d6efd; }
        .content { padding: 20px; display: none; }
        .content.active { display: block; }
        #map { flex-grow: 1; height: 100%; z-index: 1;}
        
        .card { border: 1px solid #dee2e6; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #fff;}
        .tags { margin: 10px 0; font-size: 12px;} .tag { background: #e9ecef; padding: 4px 8px; border-radius: 12px; margin-right: 5px;}
        
        button { border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; color: white; margin-top: 5px;}
        .btn-primary { background: #0d6efd; } .btn-success { background: #198754; } .btn-warning { background: #ffc107; color: black;}
        input, select, textarea { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .collection-item { background: #f8f9fa; padding: 10px; margin-bottom: 5px; display: flex; justify-content: space-between;}
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('list')">Все Маршруты</div>
            <div class="tab" onclick="switchTab('collections')">Мои Подборки</div>
            <div class="tab" onclick="switchTab('profile')">Профиль & Рекомендации</div>
            <div class="tab" onclick="switchTab('create')">Создать</div>
        </div>

        <div id="list" class="content active">
            <h2 id="listTitle">Доступные маршруты</h2>
            <div id="routesList"></div>
        </div>

        <div id="collections" class="content">
            <h2>Создать коллекцию</h2>
            <input type="text" id="newCollName" placeholder="Название (напр. 'Лето 2024')">
            <button class="btn-primary" onclick="createCollection()">Создать</button>
            <hr>
            <h2>Мои коллекции</h2>
            <div id="collectionsList"></div>
        </div>

        <div id="profile" class="content">
            <h2>Мои предпочтения</h2>
            <p style="font-size:12px">Введите ваши любимые категории через запятую (напр. Горы, Парки, Экстрим)</p>
            <input type="text" id="prefsInput" placeholder="Ваши интересы">
            <button class="btn-success" onclick="savePrefs()">Сохранить предпочтения</button>
            <hr>
            <h2>Рекомендовано вам</h2>
            <div id="recsList"></div>
        </div>

        <div id="create" class="content">
            <h2>Новый маршрут</h2>
            <form id="routeForm">
                <input type="text" id="title" placeholder="Название" required>
                <textarea id="description" placeholder="Описание" rows="3"></textarea>
                
                <!-- DATALIST: Позволяет и выбирать, и писать свой текст -->
                <label>Категория (выберите или впишите свою):</label>
                <input list="catList" id="category" placeholder="Например: Исторические" required>
                <datalist id="catList"></datalist>
                
                <label>Сложность: <span id="diffVal">3</span></label>
                <input type="range" id="difficulty" min="1" max="5" value="3" oninput="document.getElementById('diffVal').innerText=this.value">

                <div style="margin: 15px 0;">Дистанция: <span id="distDisplay">0</span> км | Точек: <span id="pointsCount">0</span></div>
                <button type="button" onclick="clearTempMap()" class="btn-warning" style="width:100%">Очистить карту</button>
                <button type="submit" class="btn-primary" style="width:100%; margin-top:10px;">Сохранить маршрут</button>
            </form>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([43.5855, 39.7231], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let mapLayers = L.featureGroup().addTo(map);
        let createLayers = L.featureGroup().addTo(map);
        let isCreateMode = false, tempPOIs = [], myCollections = [];

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            isCreateMode = (tabId === 'create');
            
            if(tabId === 'create') loadCategories();
            if(tabId === 'list') { document.getElementById('listTitle').innerText = 'Все маршруты'; loadRoutes(); }
            if(tabId === 'collections') loadCollections();
            if(tabId === 'profile') loadProfileAndRecs();
        }

        // Рисование на карте
        map.on('click', function(e) {
            if (!isCreateMode) return;
            tempPOIs.push(e.latlng);
            createLayers.clearLayers();
            tempPOIs.forEach(p => L.marker(p).addTo(createLayers));
            if (tempPOIs.length > 1) {
                L.polyline(tempPOIs, {color: 'red'}).addTo(createLayers);
                let dist = 0;
                for(let i=0; i<tempPOIs.length-1; i++) dist += map.distance(tempPOIs[i], tempPOIs[i+1]);
                document.getElementById('distDisplay').innerText = (dist/1000).toFixed(2);
            }
            document.getElementById('pointsCount').innerText = tempPOIs.length;
        });

        function clearTempMap() { createLayers.clearLayers(); tempPOIs = []; document.getElementById('distDisplay').innerText='0'; document.getElementById('pointsCount').innerText='0'; }

        // Загрузка списков
        async function loadCategories() {
            const res = await fetch('/api/categories');
            const cats = await res.json();
            document.getElementById('catList').innerHTML = cats.map(c => `<option value="${c}">`).join('');
        }

        async function loadCollections() {
            const res = await fetch('/api/collections');
            myCollections = await res.json();
            document.getElementById('collectionsList').innerHTML = myCollections.map(c => `
                <div class="collection-item">
                    <b>${c.name}</b>
                    <button class="btn-success" onclick="shareCollection(${c.id})">🔗 Поделиться</button>
                </div>
            `).join('');
        }

        async function loadProfileAndRecs() {
            const prefRes = await fetch('/api/preferences');
            document.getElementById('prefsInput').value = (await prefRes.json()).prefs;
            
            const recsRes = await fetch('/api/recommendations');
            renderRoutes(await recsRes.json(), 'recsList', true); // Без кнопок "Добавить"
        }

        async function loadRoutes() {
            await loadCollections(); // Обновим список коллекций для селектора
            const res = await fetch('/api/routes');
            renderRoutes(await res.json(), 'routesList', false);
        }

        // Отрисовка карточек
        function renderRoutes(routes, containerId, isReadOnly) {
            const list = document.getElementById(containerId);
            list.innerHTML = routes.length ? '' : 'Нет маршрутов';
            
            // Генерируем выпадающий список коллекций юзера
            const collOptions = myCollections.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

            routes.forEach(r => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <h3>${r.title}</h3>
                    <div class="tags"><span class="tag">${r.category}</span><span class="tag">Сложность: ${r.difficulty}</span></div>
                    <p style="font-size:12px">${r.description}</p>
                    <button class="btn-primary" onclick='drawRoute(${JSON.stringify(r.poi)})'>🗺️ Показать на карте</button>
                    
                    ${!isReadOnly && myCollections.length > 0 ? `
                        <div style="margin-top:10px; background:#f4f4f4; padding:5px; border-radius:5px;">
                            <select id="sel_${r.id}" style="width:60%; display:inline;">${collOptions}</select>
                            <button class="btn-warning" onclick="addToColl(${r.id})">В коллекцию</button>
                        </div>
                    ` : ''}
                `;
                list.appendChild(div);
            });
        }

        function drawRoute(poi) {
            mapLayers.clearLayers();
            if(!poi || !poi.length) return alert('Нет гео-точек');
            const latlngs = poi.map(p => [p.lat, p.lng]);
            const polyline = L.polyline(latlngs, {color: 'blue', weight: 4}).addTo(mapLayers);
            poi.forEach((p, i) => L.marker([p.lat, p.lng]).bindPopup(`Точка ${i+1}`).addTo(mapLayers));
            map.fitBounds(polyline.getBounds());
        }

        // Действия
        async function savePrefs() {
            await fetch('/api/preferences', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({prefs: document.getElementById('prefsInput').value}) });
            alert('Предпочтения сохранены!');
            loadProfileAndRecs();
        }

        async function createCollection() {
            const name = document.getElementById('newCollName').value;
            if(!name) return;
            await fetch('/api/collections', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name}) });
            document.getElementById('newCollName').value = '';
            loadCollections();
        }

        async function addToColl(routeId) {
            const collId = document.getElementById(`sel_${routeId}`).value;
            await fetch('/api/collections/add', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({collection_id: collId, route_id: routeId}) });
            alert('Добавлено в коллекцию!');
        }

        function shareCollection(collId) {
            const url = `${window.location.origin}/?shared_collection=${collId}`;
            navigator.clipboard.writeText(url);
            alert('Ссылка на коллекцию скопирована!\nОтправьте её друзьям.');
        }

        document.getElementById('routeForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                title: document.getElementById('title').value, description: document.getElementById('description').value,
                category: document.getElementById('category').value, difficulty: document.getElementById('difficulty').value,
                distance_km: document.getElementById('distDisplay').innerText, poi: tempPOIs
            };
            if(tempPOIs.length < 2) return alert('Минимум 2 точки!');
            await fetch('/api/routes', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert('Маршрут создан!'); clearTempMap(); document.querySelectorAll('.tab')[0].click();
        };

        // Загрузка расшаренной коллекции по ссылке
        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const sharedId = params.get('shared_collection');
            if (sharedId) {
                const res = await fetch(`/api/collections/${sharedId}`);
                const routes = await res.json();
                document.getElementById('listTitle').innerText = `Коллекция: ${routes[0]?.collection_name || 'Пустая'}`;
                renderRoutes(routes, 'routesList', true);
            } else {
                loadRoutes();
            }
        };
    </script>
</body>
</html>
